services:
  lb:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
      signer:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9443:9443"
    volumes:
      - ./lb/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./certs:/etc/nginx/certs:ro,Z
      - signer_state:/etc/nginx/client-ca:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/lb/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - demo_net

  app:
    build:
      context: ./app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - demo_net

  signer:
    build:
      context: ./signer
    expose:
      - "8000"
    volumes:
      - signer_state:/srv/signer/state
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - demo_net

networks:
  demo_net:
    driver: bridge

volumes:
  signer_state:
