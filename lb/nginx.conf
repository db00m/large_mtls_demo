events {}

http {
  log_format demo '$remote_addr - $request_method $request_uri '
                  'status=$status upstream=$upstream_addr '
                  'host=$host forwarded_for="$http_x_forwarded_for"';
  access_log /dev/stdout demo;
  error_log /dev/stderr info;

  map $ssl_client_s_dn $client_cert_user_id {
    default "";
    ~serialNumber=(?<cert_user_id>[^,/]+) $cert_user_id;
  }

  upstream app_upstream {
    server app:8000;
  }

  upstream signer_upstream {
    server signer:8000;
  }

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    location = /lb/healthz {
      access_log off;
      default_type application/json;
      return 200 '{"service":"lb","status":"ok"}';
    }

    location / {
      return 308 https://localhost:8443$request_uri;
    }
  }

  server {
    listen 8443 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /lb/healthz {
      access_log off;
      default_type application/json;
      return 200 '{"service":"lb","status":"ok"}';
    }

    location = /enroll {
      proxy_pass http://signer_upstream/enroll;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Demo-Trusted-Proxy lb;
    }

    location /signer/ {
      proxy_pass http://signer_upstream/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Demo-Trusted-Proxy lb;
    }

    location / {
      proxy_pass http://app_upstream;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Demo-Trusted-Proxy lb;
    }
  }

  server {
    listen 9443 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_client_certificate /etc/nginx/client-ca/demo-client-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    location = /lb/healthz {
      access_log off;
      default_type application/json;
      return 200 '{"service":"lb","status":"ok"}';
    }

    location / {
      proxy_pass http://app_upstream;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Demo-Trusted-Proxy lb;
      proxy_set_header X-Client-Verify $ssl_client_verify;
      proxy_set_header X-Client-Subject $ssl_client_s_dn;
      proxy_set_header X-Client-Issuer $ssl_client_i_dn;
      proxy_set_header X-Client-Cert-User-Id $client_cert_user_id;
    }
  }
}
